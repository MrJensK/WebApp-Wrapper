name: Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # Krävs för att ladda upp filer till GitHub Release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install npm dependencies
        run: npm install

      # ── Windows ────────────────────────────────────────────────────────────
      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        run: npx tauri build --target ${{ matrix.target }}

      # ── macOS ──────────────────────────────────────────────────────────────
      # GitHub Actions sätter saknade secrets som tomma strängar (""), inte som
      # avsaknad variabel. Tauri kontrollerar med std::env::var() och tolkar ""
      # som "credentials finns" → försöker notarisera → kraschar på Team ID.
      # Lösning: env -u tar bort variablerna helt så Tauri ser dem som frånvarande
      # → hoppar över notarisering, signerar bara ad-hoc med "-" (standard).
      - name: Build (macOS)
        if: matrix.os == 'macos-latest'
        run: >
          env -u APPLE_ID -u APPLE_PASSWORD -u APPLE_TEAM_ID
          npx tauri build --target ${{ matrix.target }}

      # ── Publicera till GitHub Release ─────────────────────────────────────
      - name: Publicera till release (Windows)
        if: matrix.os == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi

      - name: Publicera till release (macOS)
        if: matrix.os == 'macos-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
