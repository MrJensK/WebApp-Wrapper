name: Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install npm dependencies
        run: npm install

      # ── Windows ──────────────────────────────────────────────────────────────
      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        run: npx tauri build --target ${{ matrix.target }}

      # ── macOS ─────────────────────────────────────────────────────────────────
      # Bygg bara .app (ej DMG) – vi skapar en anpassad DMG med installationsskript.
      # env -u tar bort Apple-variabler helt så att Tauri hoppar över notarisering.
      - name: Build (macOS, endast .app)
        if: matrix.os == 'macos-latest'
        run: >
          env -u APPLE_ID -u APPLE_PASSWORD -u APPLE_TEAM_ID
          npx tauri build --target ${{ matrix.target }} --bundles app

      - name: Skapa DMG med installationsskript (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          BUNDLE="src-tauri/target/${{ matrix.target }}/release/bundle"
          APP=$(find "$BUNDLE/macos" -maxdepth 1 -name "*.app" | head -1)
          APP_NAME=$(basename "$APP" .app)

          # Staging-mapp för DMG-innehållet
          STAGING=$(mktemp -d)

          # Kopiera .app
          cp -r "$APP" "$STAGING/$APP_NAME.app"

          # Lägg till installationsskriptet från repot
          cp install-from-dmg.command "$STAGING/Installera SDK.command"
          chmod +x "$STAGING/Installera SDK.command"

          # Symlink till /Applications (standard drag-and-drop-känsla)
          ln -s /Applications "$STAGING/Applications"

          # Skapa DMG
          mkdir -p "$BUNDLE/dmg"
          hdiutil create \
            -volname "$APP_NAME" \
            -srcfolder "$STAGING" \
            -ov -format UDZO \
            "$BUNDLE/dmg/$APP_NAME.dmg"

          rm -rf "$STAGING"
          echo "DMG skapad: $BUNDLE/dmg/$APP_NAME.dmg"

      # ── Publicera till GitHub Release ─────────────────────────────────────────
      - name: Publicera till release (Windows)
        if: matrix.os == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi

      - name: Publicera till release (macOS)
        if: matrix.os == 'macos-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
