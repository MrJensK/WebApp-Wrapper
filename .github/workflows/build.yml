name: Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install npm dependencies
        run: npm install

      # ── macOS: importera signeringscertifikat ──────────────────────────────
      - name: Import Apple certificate
        if: matrix.os == 'macos-latest' && env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "build" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "build" build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "build" build.keychain
          rm certificate.p12

      - name: Build
        run: npx tauri build --target ${{ matrix.target }}

      - name: Ad-hoc sign och packa om DMG (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          BUNDLE="src-tauri/target/${{ matrix.target }}/release/bundle"
          APP=$(find "$BUNDLE/macos" -maxdepth 1 -name "*.app" | head -1)
          APP_NAME=$(basename "$APP" .app)

          # Ad-hoc signera .app (utan att trigga notarisering)
          codesign --force --deep --sign - "$APP"

          # Packa om en ny DMG med den signerade appen
          hdiutil create \
            -volname "$APP_NAME" \
            -srcfolder "$APP" \
            -ov -format UDZO \
            "$BUNDLE/dmg/$APP_NAME.dmg"

      - name: Upload Windows installer
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
          if-no-files-found: error

      - name: Upload macOS DMG (${{ matrix.target }})
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.target }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          if-no-files-found: error
